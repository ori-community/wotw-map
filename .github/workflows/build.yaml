name: build-and-publish

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Create build environment
        run: |
          mkdir -p ./.build/godot

      - name: Clone Godot
        working-directory: ./.build/godot
        run: |
          git clone --depth 1 --single-branch --branch 4.6.2-stable https://github.com/godotengine/godot.git .

      - name: Cache Godot binaries
        uses: actions/cache@v5
        with:
          path: ./.build/godot/bin
          key: godot-bin

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            scons \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libxi-dev \
            libxrandr-dev \
            libwayland-dev

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 4.0.11

      - name: Compile Godot WASM
        working-directory: ./.build/godot
        run: scons progress=no platform=web target=template_release threads=no optimize=size_extra build_profile="$(realpath ../../compilation-profile.gdbuild)"

      - name: Copy WASM
        run: cp -v ./.build/godot/bin/*.wasm pkg/dist/wotw-map.wasm

      - name: Compile Godot Editor
        working-directory: ./.build/godot
        run: scons progress=no platform=linuxbsd target=editor production=yes lto=none

      - name: Export PCK
        run: |
          ./.build/godot/bin/godot.linuxbsd.editor.x86_64 --headless --export-pack Web pkg/dist/wotw-map.pck
          test -e pkg/dist/wotw-map.pck

      - run: npm publish --provenance
        working-directory: ./pkg
